<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKILIFE</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="./Components/state_bar/state_bar.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="container">
        <header class="main-header">
            <div class="logo-area">
                <span class="brand-name">IKILIFE</span>
            </div>

            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" aria-label="Cambiar modo">
                    <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                    </svg>
                    <svg class="moon-icon hidden" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <div class="header-divider"></div>

                <div class="profile-menu-container">
                    <button class="profile-btn" aria-label="Menú de usuario"
                        onclick="document.getElementById('profile-dropdown').classList.toggle('hidden')">
                        <img src="https://ui-avatars.com/api/?name=Diego&background=74C08A&color=fff"
                            alt="Foto de perfil" class="profile-pic" id="user-avatar">
                    </button>

                    <div id="profile-dropdown" class="dropdown-menu hidden">
                        <div class="dropdown-header">Mi Cuenta</div>
                        <button class="dropdown-item">Ajustes</button>
                        <button class="dropdown-item text-danger">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </header>

        <!--
            STATE BAR: ahora muestra, además del bloque activo, las demás
            actividades disponibles en el día (chips) y un menú desplegable
            con sugerencias concretas al hacer clic en cualquiera de ellas.
            Toda esta estructura interna la genera renderStateBar() en main.js.
        -->
        <div id="state-bar-container"></div>

        <div class="weekly-progress-container">
            <div class="progress-header">
                <!-- Ahora muestra la semana del AÑO (no la semana del mes) -->
                <span id="current-week-text" class="week-title">Avance Semana -- de 52</span>
                <span id="current-month-text" class="month-title">--</span>
            </div>

            <div class="progress-bar-segmented">
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
            </div>

            <div class="progress-labels">
                <span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span>
            </div>
        </div>

        <nav class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('habits', this)">Habits</button>
            <button class="tab-btn tab-inactive" onclick="switchTab('metrics', this)">Metrics</button>

            <button class="tab-btn tab-inactive" onclick="switchTab('ideas', this)">Brain Dump</button>
            <button class="tab-btn tab-inactive" onclick="switchTab('tareas', this)">Tareas</button>

            <button class="tab-btn tab-inactive" onclick="switchTab('loves', this)">Loves</button>
            <button class="tab-btn tab-inactive" onclick="switchTab('sentimientos', this)">Sentimientos</button>

            <button class="tab-btn tab-inactive" onclick="switchTab('money', this)">Finance</button>
            <button class="tab-btn tab-inactive" onclick="switchTab('compras', this)">Compras</button>
        </nav>

        <main id="main-content">

            <!-- HABITOS -->

            <div id="view-habits" class="view-content active">
                <section class="category">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background-color: transparent; border-bottom: 1px solid var(--border-color);">
                        <button class="icon-btn" onclick="changeWeek(-1)" title="Semana anterior">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <span id="habit-week-label"
                            style="font-size: 0.85rem; font-weight: 700; color: var(--text-dark);">Semana Actual</span>
                        <button class="icon-btn" id="btn-next-week" onclick="changeWeek(1)" title="Semana siguiente"
                            disabled style="opacity: 0.3; cursor: default;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>

                    <div class="item-list-header habit-grid">
                        <button class="add-habit-btn" onclick="addHabit()" aria-label="Agregar nuevo hábito">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Habit
                        </button>
                        <div class="day-label" id="day-label-1">--</div>
                        <div class="day-label" id="day-label-2">--</div>
                        <div class="day-label" id="day-label-3">--</div>
                        <div class="day-label" id="day-label-4">--</div>
                        <div class="day-label" id="day-label-5">--</div>
                        <div class="day-label" id="day-label-6">--</div>
                        <div class="day-label" id="day-label-7">--</div>
                    </div>

                    <ul id="list-habits" style="list-style:none;"></ul>

                    <!--
                        Se eliminó el botón "Semana (CSV)" (no era necesario).
                        Se conserva un único botón de exportación que ahora
                        sí funciona: descarga TODO el historial de hábitos.
                    -->
                    <div
                        style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; padding-bottom: 16px;">
                        <button class="add-habit-btn" onclick="exportAllHistoryCSV()" aria-label="Exportar histórico"
                            style="background-color: var(--text-dark); color: var(--bg-light); border: 1px solid var(--text-dark);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                                style="margin-right: 4px;">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Historial Completo (CSV)
                        </button>
                    </div>
                </section>
            </div>

            <!-- METRICAS -->

            <div id="view-metrics" class="view-content">
                <section class="category">
                    <!-- 1. Progreso del Año: ahora con semana actual corriendo + días restantes -->
                    <div style="padding: 16px 16px 0;">
                        <div class="category-header year-progress-title" id="year-progress-title"
                            style="border-bottom: none; padding-left: 0; padding-right: 0;">
                            Progreso del Año · Semana -- de 52
                            <span class="year-progress-subtitle">Calculando días restantes...</span>
                        </div>
                        <div id="year-weeks-grid" class="weeks-grid"></div>
                    </div>

                    <!--
                        2. Se eliminó por completo el gráfico radar "Avance de Proyectos"
                        (canvas #balanceChart): no funcionaba bien y no aportaba valor real.
                    -->

                    <!-- 3. Top 3 mejores hábitos históricos -->
                    <div class="top-habits-wrapper" style="border-top: 1px solid var(--border-color);">
                        <div class="category-header" style="border-bottom: none;">Tus 3 Mejores Hábitos</div>
                        <div id="top-habits-list" class="top-habits-list"></div>
                    </div>

                </section>
            </div>

            <!-- TAREAS -->

            <div id="view-tareas" class="view-content">
                <section class="category">
                    <div class="item-list-header tarea-header">
                        <button class="add-habit-btn" onclick="addTarea()" aria-label="Agregar tarea">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Nueva Tarea
                        </button>
                    </div>
                    <!--
                        Las tareas ahora soportan, igual que Brain Dump:
                        clic = editar texto, clic derecho = eliminar permanentemente.
                        El botón check se conserva para "completar" la tarea.
                    -->
                    <ul id="list-tareas-dia" style="list-style:none;"></ul>
                </section>
            </div>

            <!-- MONEY -->

            <div id="view-money" class="view-content">
                <section class="category">
                    <div id="subview-finanzas" style="padding: 16px;">
                        <div id="finance-main">
                            <section class="summary-grid">
                                <div class="summary-card full-width">
                                    <div class="summary-label">Ahorro / Capital</div>
                                    <div class="summary-value text-savings" id="kpi-ahorro">$0</div>
                                </div>
                                <div class="summary-card clickable" onclick="toggleFinanceView('finance-income')"
                                    title="Ver detalles de ingresos">
                                    <div class="summary-label">Ingresos</div>
                                    <div class="summary-value text-income" id="kpi-ingresos">$0</div>
                                </div>
                                <div class="summary-card">
                                    <div class="summary-label">Gastos Totales</div>
                                    <div class="summary-value text-expense" id="kpi-gastos"
                                        title="Suma de lo pagado real">$0</div>
                                </div>
                            </section>
                            <div id="dynamic-expense-categories"></div>
                            <button class="add-habit-btn" style="width: 100%; margin-top: 8px;"
                                onclick="addFinanceCategory()">+ Nueva Categoría</button>
                        </div>
                    </div>
                </section>
            </div>

            <!-- IDEAS -->

            <div id="view-ideas" class="view-content">
                <section class="category">
                    <div class="item-list-header idea-header" style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <button class="add-habit-btn" onclick="addIdea()" aria-label="Agregar nueva idea">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Nueva Idea
                        </button>
                        <button class="add-habit-btn" onclick="exportIdeasCSV()"
                            aria-label="Exportar histórico de ideas"
                            style="background-color: transparent; border: 1px solid var(--border-color); color: var(--text-dark);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                                style="margin-right: 4px;">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Historial (CSV)
                        </button>
                    </div>
                    <ul id="list-ideas" style="list-style:none;"></ul>
                </section>
            </div>

            <!-- LOVES -->

            <div id="view-loves" class="view-content">
                <section class="category">
                    <div id="subview-loves-pasiones">
                        <div class="item-list-header love-header" style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <button class="add-habit-btn" onclick="addLove()" aria-label="Agregar nueva pasión">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                Add Pasión
                            </button>
                            <!-- Nuevo botón: exportar historial completo de Loves a CSV -->
                            <button class="add-habit-btn" onclick="exportLovesCSV()"
                                aria-label="Exportar histórico de Loves"
                                style="background-color: transparent; border: 1px solid var(--border-color); color: var(--text-dark);">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                                    style="margin-right: 4px;">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Historial (CSV)
                            </button>
                        </div>
                        <div id="list-loves"></div>
                    </div>
                </section>
            </div>

            <!-- SENTIMIENTOS -->

            <div id="view-sentimientos" class="view-content">
                <section class="category">
                    <div id="subview-sentimientos-cards">
                        <div class="item-list-header love-header">
                            <button class="add-habit-btn" onclick="addSentimiento()" aria-label="Agregar nuevo sentimiento">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                Add Sentimiento
                            </button>
                        </div>
                        <div id="list-sentimientos"></div>
                    </div>
                </section>
            </div>

            <!-- COMPRAS -->

            <div id="view-compras" class="view-content">
                <section class="category">
                    <div id="subview-compras-cards">
                        <div class="item-list-header love-header">
                            <button class="add-habit-btn" onclick="addCompra()" aria-label="Agregar nueva compra">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                Add Compra
                            </button>
                        </div>
                        <div id="list-compras"></div>
                    </div>
                </section>
            </div>

        </main>
    </div>

    <script src="main.js"></script>
</body>

</html>
