<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKILIFE Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">
        <header class="main-header">
            <div class="logo-area">
                <div class="logo-circle">
                    <svg width="20" height="20" viewBox="0 0 100 100" fill="none" stroke="currentColor"
                        stroke-width="6">
                        <circle cx="50" cy="50" r="45" />
                        <path d="M30 40 L70 40 M50 30 L50 70" />
                    </svg>
                </div>
                <span class="brand-name">IKILIFE</span>
            </div>

            <div style="display: flex; align-items: center; gap: 12px;">
                <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" aria-label="Cambiar modo">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                    </svg>
                    <svg class="moon-icon hidden" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div class="profile-dot"></div>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('habits', this)">Hábitos</button>
            <button class="tab-btn tab-inactive" onclick="switchTab('money', this)">Dinero</button>
        </nav>

        <main id="main-content">
            <div id="view-habits" class="view-content active">
                <section class="category">
                    <div class="category-header">Semana Actual</div>
                    <div class="item-list-header habit-grid">
                        <div class="day-label"
                            style="text-align: left; cursor: pointer; display: flex; align-items: center; gap: 5px;"
                            onclick="addHabit()">
                            Hábito <span style="font-size: 1.2rem; line-height: 0;">+</span>
                        </div>
                        <div class="day-label">L</div>
                        <div class="day-label">M</div>
                        <div class="day-label">M</div>
                        <div class="day-label">J</div>
                        <div class="day-label">V</div>
                        <div class="day-label">S</div>
                        <div class="day-label">D</div>
                    </div>
                    <ul id="list-habits" style="list-style:none;"></ul>
                </section>

            </div>
        </main>

    </div>

    <script src="main.js"></script>
</body>

</html>
