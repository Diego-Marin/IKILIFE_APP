<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKILIFE Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="container">
        <header class="main-header">
            <div class="logo-area">
                <span class="brand-name">IKILIFE</span>
            </div>

            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" aria-label="Cambiar modo">
                    <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                    </svg>
                    <svg class="moon-icon hidden" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <div class="header-divider"></div>

                <div class="profile-menu-container">
                    <button class="profile-btn" aria-label="Menú de usuario"
                        onclick="document.getElementById('profile-dropdown').classList.toggle('hidden')">
                        <img src="https://ui-avatars.com/api/?name=Diego&background=74C08A&color=fff"
                            alt="Foto de perfil" class="profile-pic" id="user-avatar">
                    </button>

                    <div id="profile-dropdown" class="dropdown-menu hidden">
                        <div class="dropdown-header">Mi Cuenta</div>
                        <button class="dropdown-item">Ajustes</button>
                        <button class="dropdown-item text-danger">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('habits', this)">Hábitos</button>
            <button class="tab-btn tab-inactive" onclick="switchTab('money', this)">Dinero</button>
            <button class="tab-btn tab-inactive" onclick="switchTab('ideas', this)">Lluvia de Ideas</button>
            <button class="tab-btn tab-inactive" onclick="switchTab('escuelas', this)">Escuelas</button>
        </nav>

        <div class="weekly-progress-container">
            <div class="progress-header">
                <span id="current-week-text" class="week-title">Metricas Semana --</span>
                <span id="current-month-text" class="month-title">--</span>
            </div>

            <div class="progress-bar-segmented">
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
                <div class="day-segment"></div>
            </div>

            <div class="progress-labels">
                <span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span>
            </div>
        </div>

        <main id="main-content">
            <div id="view-habits" class="view-content active">
                <section class="category">

                    <div class="item-list-header habit-grid">
                        <button class="add-habit-btn" onclick="addHabit()" aria-label="Agregar nuevo hábito">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
    Nuevo Hábito
</button>
                        <div class="day-label" id="day-label-1">--</div>
                        <div class="day-label" id="day-label-2">--</div>
                        <div class="day-label" id="day-label-3">--</div>
                        <div class="day-label" id="day-label-4">--</div>
                        <div class="day-label" id="day-label-5">--</div>
                        <div class="day-label" id="day-label-6">--</div>
                        <div class="day-label" id="day-label-7">--</div>
                    </div>

                    <ul id="list-habits" style="list-style:none;"></ul>
                </section>
            </div>

            <div id="view-money" class="view-content">
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>

</html>
